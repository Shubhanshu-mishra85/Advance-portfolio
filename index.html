<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shubhanshu Mishra Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>Shubhanshu Mishra</h2>
  <nav>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
  </nav>
  <button class="toggle" onclick="toggleMode()">Mode</button>
</header>

<section id="home" class="hero fade">
  <h1>Hello, I'm Shubhanshu Mishra</h1>
  <p>Frontend Developer | Learner | Creator</p>
  <button class="btn">View Projects</button>
</section>

<section id="projects" class="fade">
  <h2>Projects</h2>
  <div class="projects">
    <div class="card">Project 1</div>
    <div class="card">Project 2</div>
    <div class="card">Project 3</div>
  </div>
</section>

<section id="skills" class="fade">
  <h2>Skills</h2>
  <div class="skills">
    <div class="bar">HTML<div style="width:90%"></div></div>
    <div class="bar">CSS<div style="width:85%"></div></div>
    <div class="bar">JavaScript<div style="width:70%"></div></div>
  </div>
</section>

<section id="contact" class="contact fade">
  <h2>Contact Me</h2>
  <input placeholder="Your Name">
  <input placeholder="Your Email">
  <textarea placeholder="Your Message"></textarea>
  <button class="btn">Send</button>
</section>

<footer>
  <p>© 2026 Shubhanshu Mishra</p>
</footer>

<script>
function toggleMode(){
  document.body.classList.toggle("light");
}

const fades = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  fades.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
