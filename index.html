<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Shubhanshu Mishra</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background:#0f172a;
  color:white;
  transition:0.4s;
}

body.light{
  background:#f1f5f9;
  color:black;
}

header{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  z-index:1000;
}

nav a{
  margin:0 10px;
  text-decoration:none;
  color:white;
}

.toggle{
  cursor:pointer;
  padding:5px 10px;
  border-radius:10px;
  background:#38bdf8;
  color:black;
}

section{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:80px 20px;
  text-align:center;
}

.hero{
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
}

.hero h1{
  font-size:50px;
}

.hero p{
  margin:10px 0;
}

.btn{
  padding:10px 20px;
  background:#22c55e;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  width:100%;
}

.card{
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  transition:0.4s;
  transform-style:preserve-3d;
}

.card:hover{
  transform:rotateY(10deg) scale(1.05);
}

.skills{
  width:80%;
}

.bar{
  margin:10px 0;
}

.bar div{
  height:10px;
  background:#38bdf8;
}

.contact input, .contact textarea{
  width:100%;
  margin:5px 0;
  padding:10px;
}

footer{
  text-align:center;
  padding:20px;
}

.fade{
  opacity:0;
  transform:translateY(30px);
  transition:0.6s;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

</style></head>
<body><header>
  <h2>Shubhanshu Mishra</h2>
  <nav>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
  </nav>
  <div class="toggle" onclick="toggleMode()">Mode</div>
</header><section id="home" class="hero fade">
  <h1>Hello, I'm Shubhanshu Mishra</h1>
  <p>Advanced HTML CSS Project</p>
  <button class="btn">Explore</button>
</section><section id="projects" class="fade">
  <h2>Projects</h2>
  <div class="projects">
    <div class="card">Project 1</div>
    <div class="card">Project 2</div>
    <div class="card">Project 3</div>
  </div>
</section><section id="skills" class="fade">
  <h2>Skills</h2>
  <div class="skills">
    <div class="bar">HTML<div style="width:90%"></div></div>
    <div class="bar">CSS<div style="width:85%"></div></div>
    <div class="bar">JS<div style="width:70%"></div></div>
  </div>
</section><section id="contact" class="contact fade">
  <h2>Contact</h2>
  <input placeholder="Name">
  <input placeholder="Email">
  <textarea placeholder="Message"></textarea>
  <button class="btn">Send</button>
</section><footer>
  <p>© 2026 Shubhanshu Mishra
